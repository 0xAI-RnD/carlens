name: carlens
description: "CarLens - Identificazione auto storiche con AI"
publish_to: 'none'
version: 0.14.3+31

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.1
  image_picker: ^1.1.2
  http: ^1.2.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  path: ^1.9.1
  intl: ^0.20.2
  google_mlkit_text_recognition: ^0.14.0
  upgrader: ^12.5.0
  flutter_local_notifications: ^21.0.0
  shared_preferences: ^2.5.5
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_analytics: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  slang_build_runner: ^4.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
